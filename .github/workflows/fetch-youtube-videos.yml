# Fetches latest YouTube videos and saves to _data/youtube_videos.json
# This allows the videos page to load instantly without client-side API calls
name: Fetch YouTube Videos

on:
  # Run weekly on Sunday at midnight UTC
  schedule:
    - cron: '0 0 * * 0'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set branch name with date
        run: echo "BRANCH=automated/update-youtube-videos-$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Fetch YouTube Videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./scripts/fetch-youtube-videos.sh

      - name: Validate fetched data
        run: |
          if ! jq empty _data/youtube_videos.json 2>/dev/null; then
            echo "::error::Invalid JSON in youtube_videos.json"
            exit 1
          fi

          count=$(jq 'length' _data/youtube_videos.json)
          if [ "$count" -eq 0 ]; then
            echo "::error::No videos in youtube_videos.json"
            exit 1
          fi

          missing=$(jq '[.[] | select(.id == null or .title == null or .thumbnail == null)] | length' _data/youtube_videos.json)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing videos are missing required fields (id, title, or thumbnail)"
            exit 1
          fi

          invalid_ids=$(jq '[.[] | select(.id | test("^[a-zA-Z0-9_-]{11}$") | not)] | length' _data/youtube_videos.json)
          if [ "$invalid_ids" -gt 0 ]; then
            echo "::error::$invalid_ids videos have invalid YouTube video IDs"
            exit 1
          fi

          empty_titles=$(jq '[.[] | select(.title == "")] | length' _data/youtube_videos.json)
          if [ "$empty_titles" -gt 0 ]; then
            echo "::error::$empty_titles videos have empty titles"
            exit 1
          fi

          invalid_views=$(jq '[.[] | select(.viewCount == null or (.viewCount | type) != "number" or .viewCount < 0)] | length' _data/youtube_videos.json)
          if [ "$invalid_views" -gt 0 ]; then
            echo "::error::$invalid_views videos have missing or invalid viewCount"
            exit 1
          fi

          echo "Validated $count videos"

      - name: Commit changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update YouTube videos data"
          branch: ${{ env.BRANCH }}
          create_branch: true
          file_pattern: "_data/youtube_videos.json assets/images/youtube-thumbnails/*"
          push_options: "--force"

      - name: Create and merge PR
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DEPLOY_PAT }}
          BRANCH: ${{ env.BRANCH }}
        run: |
          if ! gh pr list --head "$BRANCH" --state open | grep -q .; then
            gh pr create \
              --title "Update YouTube videos data" \
              --body "Automated update of YouTube video data from the channel." \
              --base main \
              --head "$BRANCH"
          fi

          gh pr merge "$BRANCH" --merge --delete-branch
